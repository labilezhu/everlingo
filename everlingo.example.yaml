# EverLingo 配置文件
# 存放于 ~/.everlingo/everlingo.yaml
# 优先级高于同名的环境变量

sys_setting:
  # LLM Provider API Key（必需）
  openai_api_key:
  # 兼容 OpenAI Chat Completions 的 API Base URL
  openai_base_url:
  # 使用的模型名称
  openai_model:

  logging_setting:
    # 日志文件路径。默认: ~/.everlingo/logs/everlingo.log
    log_file:
    # 日志级别。可选: debug/info/warn/error。默认: debug
    log_level: debug

  tracing_setting:
    # 跟踪服务。可选: langfuse 。空值时不启动 tracing
    tracing_service:
    # langfuse secret key。如 sk-lf-xxxx
    langfuse_secret_key:
    # langfuse public key。如 pk-lf-ce-xxxx
    langfuse_public_key:
    # langfuse base url。如 http://192.168.16.130:3300
    langfuse_base_url:

user_profile:
  # 用户语言设置（必填项，首次运行时交互生成）
  language:
    # 界面语言。可选值: "zh-CN", "en", "ja"
    interface_language: zh-CN
    # 目标学习语言。可选值: "zh-CN", "en", "ja" 。不能与 interface_language 相同
    target_language: en

  # 用户背景（可选）
  background:
    # 爱好描述
    hobbies: 历史与文艺
    # 主要居住地区
    residence:
    # 性别。可选值: male, female, other
    gender:

  # 词典解释风格（可选）
  # 自定义词典老师返回单词解释时包含的内容
  dictionary_definition_style: |
    - 词意
    - 词源解释和历史
    - 词性（动词，名词……）如果是动词提供过去式，过去分词
