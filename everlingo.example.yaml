# EverLingo 配置文件
# 存放于 $workspace/everlingo.yaml
# 优先级高于同名的环境变量

sys_setting:
  # LLM Provider API Key（必需）
  openai_api_key:
  # 兼容 OpenAI Chat Completions 的 API Base URL
  openai_base_url:
  # 使用的模型名称
  openai_model:
  # Embedding 模型名称（可选，无默认值）。空值时 create_ai_embedding() 抛错
  # 复用 openai_api_key / openai_base_url，指向 OpenRouter 上的 embedding 模型
  # （如 openai/text-embedding-3-small）
  openai_embedding_model:

  logging_setting:
    # 日志文件路径。默认: $workspace/logs/everlingo.log
    log_file:
    # 日志级别。可选: debug/info/warn/error。默认: debug
    log_level: debug

  tracing_setting:
    # 跟踪服务。可选: langfuse 。空值时不启动 tracing
    tracing_service:
    # langfuse secret key。如 sk-lf-xxxx
    langfuse_secret_key:
    # langfuse public key。如 pk-lf-ce-xxxx
    langfuse_public_key:
    # langfuse base url。如 http://192.168.16.130:3300
    langfuse_base_url:

user_profile:
  # 用户语言设置（必填项，首次运行时交互生成）
  language:
    # 界面语言。可选值: "zh-CN", "en", "ja", "fr", "de"
    interface_language: zh-CN
    # 目标学习语言。可选值: "zh-CN", "en", "ja", "fr", "de" 。不能与 interface_language 相同
    target_language: en

# 用户自由偏好笔记 (USER.md)
# 存放于 $workspace/USER.md ，Markdown 自由文本。
# 由用户通过聊天（Agent 调用 user_doc 工具）或外部编辑器维护。
# 内容会被注入到 Agent 的 system prompt，用于个性化查词/翻译/答疑。
# 示例内容见 /USER.example.md
